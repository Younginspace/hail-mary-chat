# yaml-language-server: $schema=https://schemas.edgespark.dev/v1/auth-config.schema.json
#
# P0: auth UI disabled. No accounts, no sign-up. Rocky runs anonymously.
# P4 will flip these back on (email + password, `requireEmailVerification: false`).

disableSignUp: true
providerEmailPassword:
  config:
    minPasswordLength: 8
    requireEmailVerification: false
    requirePasswordResetEmailVerification: false
    revokeSessionsOnPasswordReset: false
  enabled: false
providerGoogle:
  config: {}
  enabled: false
